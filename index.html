<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>IPPERG - Gestao de Disciplinas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#0b506d;--ink2:#083d54;--red:#f6453b;--green:#5fa33a;--blue:#98a5c8;--bg:#f0f4f7;--white:#fff;--border:#dce6ec;--text:#1a2b35;--muted:#6b8a99;--tag:#e6f0f5;--shadow:0 2px 12px rgba(11,80,109,.10);--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100%;overflow:hidden;font-size:13px;}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{background:var(--ink);padding:calc(var(--safe-top) + 8px) 14px 8px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo-img{height:26px;width:auto;object-fit:contain;flex-shrink:0;}
.sbox{flex:1;display:flex;align-items:center;background:rgba(255,255,255,.14);border-radius:8px;padding:5px 10px;gap:6px;min-width:0;}
.sbox input{border:none;outline:none;background:transparent;color:white;font-size:13px;font-family:'DM Sans',sans-serif;width:100%;}
.sbox input::placeholder{color:rgba(255,255,255,.5);}
.badge{background:var(--red);color:white;border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;white-space:nowrap;flex-shrink:0;}
.alerta{background:#fff1f0;border-bottom:2px solid var(--red);padding:6px 14px;font-size:11px;color:#c0392b;font-weight:600;display:none;gap:5px;align-items:flex-start;flex-shrink:0;line-height:1.4;}
.alerta.on{display:flex;}
.ctrl{background:white;border-bottom:1px solid var(--border);padding:6px 12px;display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap;}
.sm{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--muted);white-space:nowrap;}
.sm b{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--ink);}
.sm b.r{color:var(--red);} .sm b.g{color:var(--green);}
.sep{color:var(--border);}
.fbs{display:flex;gap:4px;flex-wrap:wrap;}
.fb{border:1.5px solid var(--border);background:white;color:var(--muted);border-radius:20px;padding:4px 11px;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s;}
.fb.on{background:var(--ink);border-color:var(--ink);color:white;}
.fb.ru.on{background:var(--red);border-color:var(--red);}
.lista{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 12px calc(var(--safe-bottom) + 8px);display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch;}
.lista::-webkit-scrollbar{width:3px;}
.lista::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.card{background:white;border-radius:12px;box-shadow:var(--shadow);border-left:4px solid var(--border);cursor:pointer;transition:transform .1s;}
.card:active{transform:scale(.98);}
.card.urgente{border-left-color:var(--red);background:#fffafa;}
.card.proximo{border-left-color:#f59e0b;}
.card.okcls{border-left-color:var(--green);}
.card.semprof{border-left-color:var(--blue);}
.ci{padding:11px 13px 9px;}
.r1{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px;}
.cn{background:var(--tag);color:var(--ink);border-radius:6px;padding:2px 7px;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;flex-shrink:0;margin-top:1px;}
.ct{font-size:13px;font-weight:700;color:var(--ink);line-height:1.3;flex:1;word-break:break-word;}
.cp{font-size:10px;font-weight:700;border-radius:20px;padding:3px 9px;font-family:'DM Mono',monospace;white-space:nowrap;flex-shrink:0;}
.cp.hot{background:#fee2e2;color:var(--red);} .cp.warm{background:#fef3c7;color:#92400e;} .cp.ok{background:#dcfce7;color:#166534;} .cp.past{background:var(--tag);color:var(--muted);text-decoration:line-through;}
.r2{display:flex;align-items:center;gap:6px;margin-bottom:7px;flex-wrap:wrap;}
.cpr{font-size:11px;color:var(--muted);font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cpr.sem{color:var(--red);font-weight:700;}
.ce{font-size:10px;font-weight:700;color:var(--ink);background:var(--tag);border-radius:4px;padding:2px 7px;white-space:nowrap;flex-shrink:0;}
.cd{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap;flex-shrink:0;}
.chips{display:flex;gap:4px;margin-bottom:7px;flex-wrap:wrap;}
.chip{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;transition:transform .1s;flex-shrink:0;}
.chip:active{transform:scale(.85);}
.chip.done{background:#dcfce7;} .chip.miss{background:#fee2e2;}
.pbr{display:flex;align-items:center;gap:8px;}
.pb{flex:1;height:4px;background:var(--bg);border-radius:2px;overflow:hidden;}
.pf{height:100%;background:var(--green);border-radius:2px;transition:width .3s;}
.pf.low{background:var(--red);} .pf.mid{background:#f59e0b;}
.pl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap;}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px;}
.sh-bg{display:none;position:fixed;inset:0;background:rgba(10,30,40,.5);z-index:100;align-items:flex-end;}
.sh-bg.open{display:flex;}
.sh{background:white;border-radius:20px 20px 0 0;padding:0 0 calc(var(--safe-bottom) + 20px);width:100%;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:up .25s ease;}
@keyframes up{from{transform:translateY(100%);}to{transform:translateY(0);}}
.sh-hnd{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 14px;}
.sh-hd{padding:0 20px 14px;border-bottom:1px solid var(--bg);}
.sh-hd h2{font-size:15px;font-weight:700;color:var(--ink);line-height:1.3;margin-bottom:5px;}
.sh-sub{font-size:12px;color:var(--muted);}
.sh-sub.sem{color:var(--red);font-weight:700;}
.sh-d{font-size:11px;color:var(--muted);margin-top:3px;font-family:'DM Mono',monospace;}
.sh-sc{padding:14px 20px;}
.sh-sc-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px;}
.cl{display:flex;flex-direction:column;gap:6px;}
.cr{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg);border-radius:10px;cursor:pointer;-webkit-user-select:none;user-select:none;}
.cr.done{background:#f0fdf4;}
.cdot{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all .15s;}
.cr.done .cdot{background:var(--green);border-color:var(--green);color:white;}
.clbl{font-size:13px;font-weight:500;}
.cr.done .clbl{color:var(--green);}
.obs-w{padding:0 20px 14px;}
.obs-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:7px;}
.obs-ta{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);resize:none;min-height:70px;outline:none;}
.obs-ta:focus{border-color:var(--ink);}
.sh-ft{display:flex;gap:10px;padding:0 20px;}
.btn-c{background:var(--bg);color:var(--muted);border:none;border-radius:12px;padding:13px 18px;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;}
.btn-s{flex:1;background:var(--ink);color:white;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;}
@media(min-width:700px){.topbar{padding:10px 24px;}.logo-img{height:30px;}.ctrl{padding:8px 20px;gap:10px;}.lista{padding:12px 20px 16px;gap:10px;display:grid;grid-template-columns:repeat(2,1fr);align-content:start;}.lista .empty{grid-column:1/-1;}.sh{max-width:560px;margin:0 auto;border-radius:20px;margin-bottom:40px;}.sh-bg{align-items:center;justify-content:center;}}
@media(min-width:1100px){.lista{grid-template-columns:repeat(3,1fr);}}
</style>
</head>

function sv(){try{localStorage.setItem(SK,JSON.stringify(E));}catch(e){}}
function dias(s){return Math.ceil((new Date(s)-new Date())/86400000);}
function fmt(s){return new Date(s).toLocaleDateString("pt-BR",{day:"2-digit",month:"short"});}
function pg(n){var f=CK.filter(function(c){return E[n][c.k];}).length;return{f:f,t:CK.length,pct:Math.round(f/CK.length*100)};}
function pCls(d){return d<0?"past":d<=14?"hot":d<=30?"warm":"ok";}
function pTxt(d){return d<0?"Realizada":d===0?"HOJE":d+"d";}
function cCls(d){var di=dias(d.s);if(!d.p)return"semprof";if(di>=0&&di<=14&&!E[d.n].aceite)return"urgente";if(di>=0&&di<=30)return"proximo";var r=pg(d.n);if(r.f===r.t)return"okcls";return"";}

function rStats(){
  var u=D.filter(function(d){var di=dias(d.s);return di>=0&&di<=14&&!E[d.n].aceite;}).length;
  var s=D.filter(function(d){return !d.p;}).length;
  var o=D.filter(function(d){var r=pg(d.n);return r.f===r.t;}).length;
  document.getElementById("s-t").textContent=D.length;
  document.getElementById("s-u").textContent=u;
  document.getElementById("s-s").textContent=s;
  document.getElementById("s-o").textContent=o;
  var ul=D.filter(function(d){var di=dias(d.s);return di>=0&&di<=14&&!E[d.n].aceite;});
  var el=document.getElementById("alerta");
  if(ul.length){
    el.classList.add("on");
    document.getElementById("alerta-txt").innerHTML="<b>"+ul.length+" disciplina(s) urgente(s):</b> "+ul.map(function(d){return "<b>"+d.n+"</b> "+(d.p||"sem professor");}).join(" \u00b7 ");
  }else{el.classList.remove("on");}
}

function render(){
  var b=document.getElementById("busca").value.toLowerCase();
  var lista=D.filter(function(d){
    if(b&&(d.d+d.p+d.e).toLowerCase().indexOf(b)===-1)return false;
    var di=dias(d.s);var r=pg(d.n);
    if(F==="urgente")return di>=0&&di<=14&&!E[d.n].aceite;
    if(F==="sem-prof")return !d.p;
    if(F==="pendentes")return r.f<r.t&&di>=0;
    if(F==="prontos")return r.f===r.t;
    if(F==="e1")return d.e==="EIXO I";
    if(F==="e2")return d.e==="EIXO II";
    if(F==="e3")return d.e==="EIXO III";
    if(F==="e4")return d.e==="EIXO IV";
    if(F==="e5")return d.e==="EIXO V";
    return true;
  });
  var el=document.getElementById("lista");
  if(!lista.length){el.innerHTML="<div class=\"empty\">Nenhuma disciplina encontrada.</div>";return;}
  var html="";
  lista.forEach(function(d){
    var di=dias(d.s);var r=pg(d.n);
    var fCls=r.pct<30?"low":r.pct<70?"mid":"";
    var chips="";
    MN.forEach(function(k){
      var v=E[d.n][k];var ch=null;
      for(var i=0;i<CK.length;i++){if(CK[i].k===k){ch=CK[i];break;}}
      chips+="<div class=\"chip "+(v?"done":"miss")+"\" data-chip=\""+d.n+"|"+k+"\" title=\""+ch.l+"\">"+ch.i+"</div>";
    });
    html+="<div class=\"card "+cCls(d)+"\" data-card=\""+d.n+"\">"+
      "<div class=\"ci\">"+
      "<div class=\"r1\"><div class=\"cn\">"+d.n+"</div><div class=\"ct\">"+d.d+"</div><div class=\"cp "+pCls(di)+"\">"+pTxt(di)+"</div></div>"+
      "<div class=\"r2\"><div class=\"cpr"+(d.p?"":" sem")+"\">"+(d.p||"A definir")+"</div><div class=\"ce\">"+d.e+"</div><div class=\"cd\">"+fmt(d.s)+"</div></div>"+
      "<div class=\"chips\">"+chips+"</div>"+
      "<div class=\"pbr\"><div class=\"pb\"><div class=\"pf "+fCls+"\" style=\"width:"+r.pct+"%\"></div></div><span class=\"pl\">"+r.f+"/"+r.t+"</span></div>"+
      "</div></div>";
  });
  el.innerHTML=html;
}

function opSh(n){
  M=n;
  var d=null;
  for(var i=0;i<D.length;i++){if(D[i].n===n){d=D[i];break;}}
  if(!d)return;
  var e=E[n];
  document.getElementById("sh-t").textContent=d.d;
  var sub=document.getElementById("sh-s");
  sub.className="sh-sub"+(d.p?"":" sem");
  sub.textContent=d.p||"Professor nao definido";
  document.getElementById("sh-d").textContent=fmt(d.s)+" a "+fmt(d.f)+" \u00b7 "+d.e;
  document.getElementById("sh-obs").value=e.obs||"";
  var clh="";
  CK.forEach(function(c){
    clh+="<div class=\"cr "+(e[c.k]?"done":"")+"\" data-check=\""+c.k+"\">"+
      "<div class=\"cdot\">"+(e[c.k]?"\u2713":"")+"</div>"+
      "<span class=\"clbl\">"+c.i+" "+c.l+"</span></div>";
  });
  document.getElementById("sh-cl").innerHTML=clh;
  document.getElementById("sh-bg").classList.add("open");
}

function saveSh(){
  if(!M)return;
  E[M].obs=document.getElementById("sh-obs").value;
  sv();rStats();render();
  document.getElementById("sh-bg").classList.remove("open");
}

// EVENT DELEGATION - tudo conectado via addEventListener, sem onclick inline
document.getElementById("busca").addEventListener("input",render);

document.querySelector(".fbs").addEventListener("click",function(ev){
  var btn=ev.target.closest(".fb");
  if(!btn)return;
  var fmap=["todos","urgente","sem-prof","pendentes","prontos","e1","e2","e3","e4","e5"];
  var btns=document.querySelectorAll(".fb");
  for(var i=0;i<btns.length;i++){
    btns[i].classList.remove("on");
    if(btns[i]===btn){F=fmap[i];btn.classList.add("on");}
  }
  render();
});

document.getElementById("lista").addEventListener("click",function(ev){
  var chip=ev.target.closest(".chip");
  if(chip){
    ev.stopPropagation();
    var parts=chip.getAttribute("data-chip").split("|");
    E[parts[0]][parts[1]]=!E[parts[0]][parts[1]];
    sv();rStats();render();
    return;
  }
  var card=ev.target.closest(".card");
  if(card){opSh(card.getAttribute("data-card"));}
});

document.getElementById("sh-cl").addEventListener("click",function(ev){
  var cr=ev.target.closest(".cr");
  if(!cr||!M)return;
  var k=cr.getAttribute("data-check");
  E[M][k]=!E[M][k];
  cr.classList.toggle("done",E[M][k]);
  cr.querySelector(".cdot").textContent=E[M][k]?"\u2713":"";
});

document.getElementById("sh-bg").addEventListener("click",function(ev){
  if(ev.target.id==="sh-bg")document.getElementById("sh-bg").classList.remove("open");
});

document.querySelector(".btn-c").addEventListener("click",function(){document.getElementById("sh-bg").classList.remove("open");});
document.querySelector(".btn-s").addEventListener("click",saveSh);

ld();rStats();render();
</script>
</body>
</html>
